<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>透視學習工具 — 平行線與視角</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Left panel ─────────────────────────────────────── */
    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(15, 15, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 18px 22px;
      color: #ddd;
      min-width: 230px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      z-index: 10;
      user-select: none;
    }
    #panel h2 { font-size: 14px; font-weight: 700; color: #ccc; margin-bottom: 4px; }
    #panel .subtitle { font-size: 11px; color: #444; margin-bottom: 16px; line-height: 1.5; }
    #panel h3 {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: #555; margin-bottom: 14px;
    }
    .section { margin-bottom: 18px; }
    .row { margin-bottom: 14px; }
    .row:last-child { margin-bottom: 0; }
    .row-label {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
    }
    .row-label span:first-child { font-size: 13px; color: #aaa; }
    .val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .val-h { color: #ffaaaa; }
    .val-v { color: #99bbff; }
    .val-pos { color: #aaa; font-size: 13px; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range].h::-webkit-slider-thumb,
    input[type=range].hl-pos::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #ffaaaa; cursor: pointer; box-shadow: 0 0 5px rgba(255,150,150,0.3);
    }
    input[type=range].v::-webkit-slider-thumb,
    input[type=range].vl-pos::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #99bbff; cursor: pointer; box-shadow: 0 0 5px rgba(100,150,255,0.3);
    }
    input[type=range].pos::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #aaa; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb { border: none; border-radius: 50%; cursor: pointer; }
    input[type=range].h::-moz-range-thumb, input[type=range].hl-pos::-moz-range-thumb { background: #ffaaaa; width: 14px; height: 14px; }
    input[type=range].v::-moz-range-thumb, input[type=range].vl-pos::-moz-range-thumb { background: #99bbff; width: 14px; height: 14px; }
    input[type=range].pos::-moz-range-thumb { background: #aaa; width: 13px; height: 13px; }

    .legend {
      display: flex; gap: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
    .legend-swatch { width: 20px; height: 2px; border-radius: 1px; }

    .reset-btn {
      display: inline-block; margin-top: 10px; padding: 5px 12px; font-size: 11px;
      color: #777; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { color: #bbb; background: rgba(255,255,255,0.1); }

    /* ── Gizmo ──────────────────────────────────────────── */
    #gizmo {
      position: fixed; top: 20px; right: 20px;
      width: 120px; height: 120px; z-index: 10; cursor: grab;
    }
    #gizmo:active { cursor: grabbing; }
    #gizmo-label {
      position: fixed; top: 145px; right: 20px; width: 120px;
      text-align: center; font-size: 10px; color: rgba(255,255,255,0.2);
      z-index: 10; pointer-events: none;
    }

    /* ── Hint ───────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.2); font-size: 12px; pointer-events: none;
      letter-spacing: 0.04em; text-align: center; line-height: 1.6;
    }

    /* ── Reference lines ────────────────────────────────── */
    .ref-line { position: fixed; pointer-events: none; z-index: 5; }
    #horizon-line {
      left: 0; right: 0; height: 0;
      border-top: 1px dashed rgba(255, 170, 170, 0.35);
    }
    #vertical-line {
      top: 0; bottom: 0; width: 0;
      border-left: 1px dashed rgba(136, 170, 255, 0.35);
    }
    .ref-label {
      position: fixed; font-size: 10px; pointer-events: none;
      z-index: 6; letter-spacing: 0.05em;
    }
    #horizon-label { color: rgba(255, 170, 170, 0.45); }
    #vertical-label { color: rgba(136, 170, 255, 0.45); }
  </style>
</head>
<body>

  <div id="horizon-line" class="ref-line"></div>
  <div id="vertical-line" class="ref-line"></div>
  <span id="horizon-label" class="ref-label">視平線 HL</span>
  <span id="vertical-label" class="ref-label">視垂線 VL</span>

  <div id="panel">
    <h2>透視學習工具</h2>
    <p class="subtitle">拖曳畫面旋轉長方形，觀察<br>平行線在透視下的變化</p>

    <div class="section">
      <h3>分割線數量</h3>
      <div class="row">
        <div class="row-label">
          <span>水平方向</span>
          <span class="val val-h" id="hVal">2</span>
        </div>
        <input type="range" class="h" id="hLines" min="0" max="12" value="2">
      </div>
      <div class="row">
        <div class="row-label">
          <span>垂直方向</span>
          <span class="val val-v" id="vVal">2</span>
        </div>
        <input type="range" class="v" id="vLines" min="0" max="12" value="2">
      </div>
    </div>

    <div class="section">
      <h3>投影中心</h3>
      <div class="row">
        <div class="row-label">
          <span>視平線 HL（上下）</span>
          <span class="val val-pos" id="hlVal">50%</span>
        </div>
        <input type="range" class="hl-pos" id="hlSlider" min="10" max="90" value="50" step="1">
      </div>
      <div class="row">
        <div class="row-label">
          <span>視垂線 VL（左右）</span>
          <span class="val val-pos" id="vlVal">50%</span>
        </div>
        <input type="range" class="vl-pos" id="vlSlider" min="10" max="90" value="50" step="1">
      </div>
    </div>

    <div class="section">
      <h3>長方形位置</h3>
      <div class="row">
        <div class="row-label">
          <span>水平偏移</span>
          <span class="val val-pos" id="posXVal">0</span>
        </div>
        <input type="range" class="pos" id="posXSlider" min="-4" max="4" value="0" step="0.1">
      </div>
      <div class="row">
        <div class="row-label">
          <span>垂直偏移</span>
          <span class="val val-pos" id="posYVal">0</span>
        </div>
        <input type="range" class="pos" id="posYSlider" min="-3" max="3" value="0" step="0.1">
      </div>
      <button class="reset-btn" id="resetBtn">全部重設</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#ff9999"></div>
        水平線（紅）
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#88aaff"></div>
        垂直線（藍）
      </div>
    </div>
  </div>

  <canvas id="gizmo"></canvas>
  <div id="gizmo-label">拖曳旋轉方塊</div>

  <div id="hint">
    🖱 拖曳旋轉長方形 · 滾輪縮放 · 右鍵平移<br>
    📱 單指旋轉 · 雙指縮放
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Main scene ─────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const CAM_DIST = 6;
    const FOV = 40;
    const camera = new THREE.PerspectiveCamera(FOV, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, CAM_DIST);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x0f0f1a);
    document.body.appendChild(renderer.domElement);

    // ── Rectangle group (position + rotation) ──────────────────────
    const rectGroup = new THREE.Group();
    scene.add(rectGroup);

    const W = 4.8, H = 3.0;

    rectGroup.add(new THREE.Mesh(
      new THREE.PlaneGeometry(W, H),
      new THREE.MeshBasicMaterial({ color: 0xf4ede0, side: THREE.DoubleSide })
    ));

    // Border
    const borderPts = [
      [-W/2, -H/2], [W/2, -H/2], [W/2, H/2], [-W/2, H/2], [-W/2, -H/2]
    ].map(([x, y]) => new THREE.Vector3(x, y, 0.002));
    rectGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(borderPts),
      new THREE.LineBasicMaterial({ color: 0x888888 })
    ));

    // ── Dividing lines ─────────────────────────────────────────────
    const hGroup = new THREE.Group();
    const vGroup = new THREE.Group();
    rectGroup.add(hGroup, vGroup);

    function buildLines(hCount, vCount) {
      hGroup.clear();
      vGroup.clear();
      const hMat = new THREE.LineBasicMaterial({ color: 0xff9999 });
      for (let i = 1; i <= hCount; i++) {
        const y = -H/2 + H * i / (hCount + 1);
        hGroup.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-W/2, y, 0.003), new THREE.Vector3(W/2, y, 0.003),
          ]), hMat
        ));
      }
      const vMat = new THREE.LineBasicMaterial({ color: 0x88aaff });
      for (let i = 1; i <= vCount; i++) {
        const x = -W/2 + W * i / (vCount + 1);
        vGroup.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x, -H/2, 0.003), new THREE.Vector3(x, H/2, 0.003),
          ]), vMat
        ));
      }
    }
    buildLines(2, 2);

    // Background grid
    const grid = new THREE.GridHelper(20, 20, 0x1e1e30, 0x1a1a28);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -0.5;
    scene.add(grid);

    // ── Mouse drag → rotate rectangle ──────────────────────────────
    let dragging = false, lastX = 0, lastY = 0;
    const rotQuat = new THREE.Quaternion();
    const tempQuat = new THREE.Quaternion();
    const axisX = new THREE.Vector3(1, 0, 0);
    const axisY = new THREE.Vector3(0, 1, 0);

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return; // left button only
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    });
    renderer.domElement.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      const speed = 0.005;
      tempQuat.setFromAxisAngle(axisY, dx * speed);
      rotQuat.premultiply(tempQuat);
      tempQuat.setFromAxisAngle(axisX, dy * speed);
      rotQuat.premultiply(tempQuat);
      rectGroup.quaternion.copy(rotQuat);
    });
    renderer.domElement.addEventListener('pointerup', () => { dragging = false; });
    renderer.domElement.addEventListener('pointercancel', () => { dragging = false; });

    // Scroll → zoom (move camera closer/further)
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const z = camera.position.z + e.deltaY * 0.005;
      camera.position.z = Math.max(1.5, Math.min(18, z));
      updateCameraTarget();
    }, { passive: false });

    // ── Gizmo ──────────────────────────────────────────────────────
    const gizmoCanvas = document.getElementById('gizmo');
    const gizmoSize = 120;
    gizmoCanvas.width = gizmoSize * devicePixelRatio;
    gizmoCanvas.height = gizmoSize * devicePixelRatio;
    gizmoCanvas.style.width = gizmoSize + 'px';
    gizmoCanvas.style.height = gizmoSize + 'px';

    const gScene = new THREE.Scene();
    const gCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    gCamera.position.set(0, 0, 4);
    gCamera.lookAt(0, 0, 0);
    const gRenderer = new THREE.WebGLRenderer({ canvas: gizmoCanvas, antialias: true, alpha: true });
    gRenderer.setPixelRatio(devicePixelRatio);
    gRenderer.setSize(gizmoSize, gizmoSize);
    gRenderer.setClearColor(0x000000, 0);

    // Gizmo cube
    const cubeGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
    gScene.add(new THREE.Mesh(cubeGeo, new THREE.MeshBasicMaterial({
      color: 0x333355, transparent: true, opacity: 0.3,
    })));
    gScene.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(cubeGeo),
      new THREE.LineBasicMaterial({ color: 0x555577, transparent: true, opacity: 0.5 })
    ));

    // Axis lines in gizmo
    const axisLen = 1.2;
    for (const { dir, color } of [
      { dir: [1,0,0], color: 0xff6666 },
      { dir: [0,1,0], color: 0x66ff66 },
      { dir: [0,0,1], color: 0x6688ff },
    ]) {
      gScene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0,0,0),
          new THREE.Vector3(dir[0]*axisLen, dir[1]*axisLen, dir[2]*axisLen),
        ]),
        new THREE.LineBasicMaterial({ color })
      ));
      const tip = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 8, 8),
        new THREE.MeshBasicMaterial({ color })
      );
      tip.position.set(dir[0]*axisLen, dir[1]*axisLen, dir[2]*axisLen);
      gScene.add(tip);
    }

    // Gizmo cube mirrors rectGroup rotation
    const gizmoGroup = new THREE.Group();
    gScene.children.forEach(c => {
      gScene.remove(c);
      gizmoGroup.add(c);
    });
    gScene.add(gizmoGroup);

    // Gizmo drag → also rotates the rectangle
    let gizmoDrag = false, gLastX = 0, gLastY = 0;
    gizmoCanvas.addEventListener('pointerdown', (e) => {
      gizmoDrag = true;
      gLastX = e.clientX;
      gLastY = e.clientY;
      gizmoCanvas.setPointerCapture(e.pointerId);
    });
    window.addEventListener('pointermove', (e) => {
      if (!gizmoDrag) return;
      const dx = e.clientX - gLastX;
      const dy = e.clientY - gLastY;
      gLastX = e.clientX;
      gLastY = e.clientY;
      const speed = 0.008;
      tempQuat.setFromAxisAngle(axisY, dx * speed);
      rotQuat.premultiply(tempQuat);
      tempQuat.setFromAxisAngle(axisX, dy * speed);
      rotQuat.premultiply(tempQuat);
      rectGroup.quaternion.copy(rotQuat);
    });
    window.addEventListener('pointerup', () => { gizmoDrag = false; });

    // ── Camera target (HL/VL projection) ───────────────────────────
    // HL/VL sliders set where on screen the camera's aim point lands.
    // We shift the camera lookAt target to achieve this.
    let hlPct = 50, vlPct = 50;

    function updateCameraTarget() {
      // Convert screen % to world-space offset at z=0
      const halfFovRad = THREE.MathUtils.degToRad(FOV / 2);
      const dist = camera.position.z;
      const visH = 2 * dist * Math.tan(halfFovRad);
      const visW = visH * camera.aspect;
      // Offset: 50% = center, lower % = shift target up, etc.
      const tx = (vlPct - 50) / 50 * (visW / 2) * 0.8;
      const ty = -(hlPct - 50) / 50 * (visH / 2) * 0.8;
      camera.lookAt(tx, ty, 0);
      camera.updateProjectionMatrix();
    }

    // ── 2D reference lines ─────────────────────────────────────────
    const horizonEl = document.getElementById('horizon-line');
    const verticalEl = document.getElementById('vertical-line');
    const horizonLabelEl = document.getElementById('horizon-label');
    const verticalLabelEl = document.getElementById('vertical-label');

    function positionRefLines() {
      const y = innerHeight * hlPct / 100;
      const x = innerWidth * vlPct / 100;
      horizonEl.style.top = y + 'px';
      verticalEl.style.left = x + 'px';
      horizonLabelEl.style.top = (y - 16) + 'px';
      horizonLabelEl.style.right = '145px';
      verticalLabelEl.style.left = (x + 6) + 'px';
      verticalLabelEl.style.top = '20px';
    }

    // ── UI wiring ──────────────────────────────────────────────────
    const hSlider = document.getElementById('hLines');
    const vSlider = document.getElementById('vLines');
    const hValEl = document.getElementById('hVal');
    const vValEl = document.getElementById('vVal');

    hSlider.addEventListener('input', () => {
      hValEl.textContent = hSlider.value;
      buildLines(+hSlider.value, +vSlider.value);
    });
    vSlider.addEventListener('input', () => {
      vValEl.textContent = vSlider.value;
      buildLines(+hSlider.value, +vSlider.value);
    });

    const hlSlider = document.getElementById('hlSlider');
    const vlSlider = document.getElementById('vlSlider');
    const hlValEl = document.getElementById('hlVal');
    const vlValEl = document.getElementById('vlVal');

    hlSlider.addEventListener('input', () => {
      hlPct = +hlSlider.value;
      hlValEl.textContent = hlPct + '%';
      positionRefLines();
      updateCameraTarget();
    });
    vlSlider.addEventListener('input', () => {
      vlPct = +vlSlider.value;
      vlValEl.textContent = vlPct + '%';
      positionRefLines();
      updateCameraTarget();
    });

    const posXSlider = document.getElementById('posXSlider');
    const posYSlider = document.getElementById('posYSlider');
    const posXVal = document.getElementById('posXVal');
    const posYVal = document.getElementById('posYVal');

    posXSlider.addEventListener('input', () => {
      posXVal.textContent = (+posXSlider.value).toFixed(1);
      rectGroup.position.x = +posXSlider.value;
    });
    posYSlider.addEventListener('input', () => {
      posYVal.textContent = (+posYSlider.value).toFixed(1);
      rectGroup.position.y = +posYSlider.value;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      hlPct = 50; vlPct = 50;
      hlSlider.value = 50; vlSlider.value = 50;
      hlValEl.textContent = '50%'; vlValEl.textContent = '50%';
      posXSlider.value = 0; posYSlider.value = 0;
      posXVal.textContent = '0'; posYVal.textContent = '0';
      rectGroup.position.set(0, 0, 0);
      rotQuat.identity();
      rectGroup.quaternion.identity();
      camera.position.z = CAM_DIST;
      positionRefLines();
      updateCameraTarget();
    });

    // Init
    positionRefLines();
    updateCameraTarget();

    // ── Resize ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      positionRefLines();
      updateCameraTarget();
    });

    // ── Render loop ────────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      // Sync gizmo cube with rectangle rotation
      gizmoGroup.quaternion.copy(rectGroup.quaternion);
      renderer.render(scene, camera);
      gRenderer.render(gScene, gCamera);
    })();
  </script>
</body>
</html>
