<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>透視學習工具 — 平行線與視角</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Left panel ─────────────────────────────────────── */
    #panel {
      position: fixed; top: 20px; left: 20px;
      background: rgba(15, 15, 26, 0.75);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 18px 22px;
      color: #ddd; min-width: 230px;
      max-height: calc(100vh - 40px); overflow-y: auto;
      z-index: 10; user-select: none;
    }
    #panel h2 { font-size: 14px; font-weight: 700; color: #ccc; margin-bottom: 4px; }
    #panel .subtitle { font-size: 11px; color: #444; margin-bottom: 16px; line-height: 1.5; }
    #panel h3 {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: #555; margin-bottom: 14px;
    }
    .section { margin-bottom: 18px; }
    .row { margin-bottom: 14px; }
    .row:last-child { margin-bottom: 0; }
    .row-label {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
    }
    .row-label span:first-child { font-size: 13px; color: #aaa; }
    .val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .val-h { color: #ffaaaa; }
    .val-v { color: #99bbff; }
    .val-pos { color: #aaa; font-size: 13px; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range].h::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #ffaaaa; cursor: pointer; box-shadow: 0 0 5px rgba(255,150,150,0.3);
    }
    input[type=range].v::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #99bbff; cursor: pointer; box-shadow: 0 0 5px rgba(100,150,255,0.3);
    }
    input[type=range].pos::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #888; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb { border: none; border-radius: 50%; cursor: pointer; }
    input[type=range].h::-moz-range-thumb { background: #ffaaaa; width: 14px; height: 14px; }
    input[type=range].v::-moz-range-thumb { background: #99bbff; width: 14px; height: 14px; }
    input[type=range].pos::-moz-range-thumb { background: #888; width: 13px; height: 13px; }

    .legend {
      display: flex; gap: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
    .legend-swatch { width: 20px; height: 2px; border-radius: 1px; }

    .reset-btn {
      display: inline-block; margin-top: 10px; padding: 5px 12px; font-size: 11px;
      color: #777; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { color: #bbb; background: rgba(255,255,255,0.1); }

    /* ── Gizmo ──────────────────────────────────────────── */
    #gizmo {
      position: fixed; top: 20px; right: 20px;
      width: 120px; height: 120px; z-index: 10; cursor: grab;
    }
    #gizmo:active { cursor: grabbing; }
    #gizmo-label {
      position: fixed; top: 145px; right: 20px; width: 120px;
      text-align: center; font-size: 10px; color: rgba(255,255,255,0.2);
      z-index: 10; pointer-events: none;
    }

    /* ── Hint ───────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.2); font-size: 12px; pointer-events: none;
      letter-spacing: 0.04em; text-align: center; line-height: 1.6;
    }

    /* ── Draggable reference lines ──────────────────────── */
    #horizon-hit {
      position: fixed; left: 0; right: 0; height: 16px; z-index: 8;
      cursor: ns-resize; transform: translateY(-50%);
    }
    #horizon-hit:hover ~ #horizon-line, #horizon-hit:active ~ #horizon-line,
    #horizon-hit.dragging ~ #horizon-line {
      border-top-color: rgba(255, 170, 170, 0.7);
    }
    #vertical-hit {
      position: fixed; top: 0; bottom: 0; width: 16px; z-index: 8;
      cursor: ew-resize; transform: translateX(-50%);
    }
    #vertical-hit:hover ~ #vertical-line, #vertical-hit:active ~ #vertical-line,
    #vertical-hit.dragging ~ #vertical-line {
      border-left-color: rgba(136, 170, 255, 0.7);
    }

    .ref-line { position: fixed; pointer-events: none; z-index: 5; }
    #horizon-line {
      left: 0; right: 0; height: 0;
      border-top: 1px dashed rgba(255, 170, 170, 0.3);
      transition: border-top-color 0.15s;
    }
    #vertical-line {
      top: 0; bottom: 0; width: 0;
      border-left: 1px dashed rgba(136, 170, 255, 0.3);
      transition: border-left-color 0.15s;
    }
    .ref-label {
      position: fixed; font-size: 10px; pointer-events: none;
      z-index: 6; letter-spacing: 0.05em; transition: color 0.15s;
    }
    #horizon-label { color: rgba(255, 170, 170, 0.4); }
    #vertical-label { color: rgba(136, 170, 255, 0.4); }
  </style>
</head>
<body>

  <!-- Draggable hit areas for reference lines -->
  <div id="horizon-hit"></div>
  <div id="vertical-hit"></div>
  <!-- Visual reference lines -->
  <div id="horizon-line" class="ref-line"></div>
  <div id="vertical-line" class="ref-line"></div>
  <span id="horizon-label" class="ref-label">視平線 HL</span>
  <span id="vertical-label" class="ref-label">視垂線 VL</span>

  <div id="panel">
    <h2>透視學習工具</h2>
    <p class="subtitle">觀察平行的分割線在<br>不同透視角度下的變化</p>

    <div class="section">
      <h3>分割線數量</h3>
      <div class="row">
        <div class="row-label">
          <span>水平方向</span>
          <span class="val val-h" id="hVal">2</span>
        </div>
        <input type="range" class="h" id="hLines" min="0" max="12" value="2">
      </div>
      <div class="row">
        <div class="row-label">
          <span>垂直方向</span>
          <span class="val val-v" id="vVal">2</span>
        </div>
        <input type="range" class="v" id="vLines" min="0" max="12" value="2">
      </div>
    </div>

    <div class="section">
      <h3>長方形位置</h3>
      <div class="row">
        <div class="row-label">
          <span>左右</span>
          <span class="val val-pos" id="posXVal">0.0</span>
        </div>
        <input type="range" class="pos" id="posX" min="-5" max="5" value="0" step="0.1">
      </div>
      <div class="row">
        <div class="row-label">
          <span>上下</span>
          <span class="val val-pos" id="posYVal">0.0</span>
        </div>
        <input type="range" class="pos" id="posY" min="-4" max="4" value="0" step="0.1">
      </div>
      <div class="row">
        <div class="row-label">
          <span>遠近</span>
          <span class="val val-pos" id="posZVal">0.0</span>
        </div>
        <input type="range" class="pos" id="posZ" min="-5" max="5" value="0" step="0.1">
      </div>
      <button class="reset-btn" id="resetBtn">全部重設</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#ff9999"></div>
        水平線（紅）
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#88aaff"></div>
        垂直線（藍）
      </div>
    </div>
  </div>

  <canvas id="gizmo"></canvas>
  <div id="gizmo-label">拖曳旋轉方塊</div>

  <div id="hint">
    拖曳畫面旋轉 · 拖曳虛線調整視平/視垂 · 滾輪縮放<br>
    📱 單指旋轉 · 雙指縮放
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Scene setup ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const FOV = 40, CAM_Z = 6;
    const camera = new THREE.PerspectiveCamera(FOV, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, CAM_Z);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x0f0f1a);
    document.body.appendChild(renderer.domElement);

    // ── Rectangle group ────────────────────────────────────────────
    const rectGroup = new THREE.Group();
    scene.add(rectGroup);
    const W = 4.8, H = 3.0;

    rectGroup.add(new THREE.Mesh(
      new THREE.PlaneGeometry(W, H),
      new THREE.MeshBasicMaterial({ color: 0xf4ede0, side: THREE.DoubleSide })
    ));

    // Border
    const bPts = [[-W/2,-H/2],[W/2,-H/2],[W/2,H/2],[-W/2,H/2],[-W/2,-H/2]]
      .map(([x,y]) => new THREE.Vector3(x, y, 0.002));
    rectGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(bPts),
      new THREE.LineBasicMaterial({ color: 0x888888 })
    ));

    // Dividing lines
    const hGroup = new THREE.Group(), vGroup = new THREE.Group();
    rectGroup.add(hGroup, vGroup);

    function buildLines(hN, vN) {
      hGroup.clear(); vGroup.clear();
      const hM = new THREE.LineBasicMaterial({ color: 0xff9999 });
      for (let i = 1; i <= hN; i++) {
        const y = -H/2 + H * i / (hN + 1);
        hGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-W/2, y, 0.003), new THREE.Vector3(W/2, y, 0.003),
        ]), hM));
      }
      const vM = new THREE.LineBasicMaterial({ color: 0x88aaff });
      for (let i = 1; i <= vN; i++) {
        const x = -W/2 + W * i / (vN + 1);
        vGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(x, -H/2, 0.003), new THREE.Vector3(x, H/2, 0.003),
        ]), vM));
      }
    }
    buildLines(2, 2);

    // Background grid
    const grid = new THREE.GridHelper(20, 20, 0x1e1e30, 0x1a1a28);
    grid.rotation.x = Math.PI / 2; grid.position.z = -0.5;
    scene.add(grid);

    // ── Drag to rotate rectangle ───────────────────────────────────
    const rotQuat = new THREE.Quaternion();
    const tmpQ = new THREE.Quaternion();
    const AX = new THREE.Vector3(1,0,0), AY = new THREE.Vector3(0,1,0);
    let rotating = false, rLastX = 0, rLastY = 0;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      rotating = true; rLastX = e.clientX; rLastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    });
    renderer.domElement.addEventListener('pointermove', (e) => {
      if (!rotating) return;
      const dx = e.clientX - rLastX, dy = e.clientY - rLastY;
      rLastX = e.clientX; rLastY = e.clientY;
      const s = 0.005;
      tmpQ.setFromAxisAngle(AY, dx * s); rotQuat.premultiply(tmpQ);
      tmpQ.setFromAxisAngle(AX, dy * s); rotQuat.premultiply(tmpQ);
      rectGroup.quaternion.copy(rotQuat);
    });
    renderer.domElement.addEventListener('pointerup', () => { rotating = false; });
    renderer.domElement.addEventListener('pointercancel', () => { rotating = false; });

    // Scroll → zoom
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z = Math.max(1.5, Math.min(18, camera.position.z + e.deltaY * 0.005));
      updateCamera();
    }, { passive: false });

    // ── Draggable HL/VL reference lines ────────────────────────────
    let hlPct = 50, vlPct = 50; // screen position as %

    const horizonHit = document.getElementById('horizon-hit');
    const verticalHit = document.getElementById('vertical-hit');
    const horizonEl = document.getElementById('horizon-line');
    const verticalEl = document.getElementById('vertical-line');
    const horizonLabel = document.getElementById('horizon-label');
    const verticalLabel = document.getElementById('vertical-label');

    function layoutRefLines() {
      const y = innerHeight * hlPct / 100;
      const x = innerWidth * vlPct / 100;
      horizonHit.style.top = y + 'px';
      horizonEl.style.top = y + 'px';
      horizonLabel.style.top = (y - 16) + 'px';
      horizonLabel.style.right = '145px';
      verticalHit.style.left = x + 'px';
      verticalEl.style.left = x + 'px';
      verticalLabel.style.left = (x + 6) + 'px';
      verticalLabel.style.top = '20px';
    }

    function updateCamera() {
      const halfTan = Math.tan(THREE.MathUtils.degToRad(FOV / 2));
      const dist = camera.position.z;
      const visH = 2 * dist * halfTan;
      const visW = visH * camera.aspect;
      const tx = (vlPct - 50) / 50 * (visW / 2) * 0.85;
      const ty = -(hlPct - 50) / 50 * (visH / 2) * 0.85;
      camera.lookAt(tx, ty, 0);
    }

    // HL drag
    let hlDrag = false;
    horizonHit.addEventListener('pointerdown', (e) => {
      hlDrag = true; horizonHit.classList.add('dragging');
      horizonHit.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    window.addEventListener('pointermove', (e) => {
      if (!hlDrag) return;
      hlPct = Math.max(5, Math.min(95, e.clientY / innerHeight * 100));
      layoutRefLines(); updateCamera();
    });
    window.addEventListener('pointerup', () => {
      if (hlDrag) { hlDrag = false; horizonHit.classList.remove('dragging'); }
    });

    // VL drag
    let vlDrag = false;
    verticalHit.addEventListener('pointerdown', (e) => {
      vlDrag = true; verticalHit.classList.add('dragging');
      verticalHit.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    window.addEventListener('pointermove', (e) => {
      if (!vlDrag) return;
      vlPct = Math.max(5, Math.min(95, e.clientX / innerWidth * 100));
      layoutRefLines(); updateCamera();
    });
    window.addEventListener('pointerup', () => {
      if (vlDrag) { vlDrag = false; verticalHit.classList.remove('dragging'); }
    });

    // ── Gizmo ──────────────────────────────────────────────────────
    const gc = document.getElementById('gizmo');
    const GS = 120;
    gc.width = GS * devicePixelRatio; gc.height = GS * devicePixelRatio;
    gc.style.width = GS + 'px'; gc.style.height = GS + 'px';

    const gScene = new THREE.Scene();
    const gCam = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    gCam.position.set(0, 0, 4); gCam.lookAt(0, 0, 0);
    const gR = new THREE.WebGLRenderer({ canvas: gc, antialias: true, alpha: true });
    gR.setPixelRatio(devicePixelRatio); gR.setSize(GS, GS); gR.setClearColor(0, 0);

    const gGroup = new THREE.Group();
    gScene.add(gGroup);

    // Cube
    const cg = new THREE.BoxGeometry(1.4, 1.4, 1.4);
    gGroup.add(new THREE.Mesh(cg, new THREE.MeshBasicMaterial({ color: 0x333355, transparent: true, opacity: 0.3 })));
    gGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(cg), new THREE.LineBasicMaterial({ color: 0x555577, transparent: true, opacity: 0.5 })));

    // Axes
    for (const { d, c } of [
      { d: [1,0,0], c: 0xff6666 }, { d: [0,1,0], c: 0x66ff66 }, { d: [0,0,1], c: 0x6688ff },
    ]) {
      const L = 1.2;
      gGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(d[0]*L, d[1]*L, d[2]*L)]),
        new THREE.LineBasicMaterial({ color: c })
      ));
      const t = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: c }));
      t.position.set(d[0]*L, d[1]*L, d[2]*L);
      gGroup.add(t);
    }

    // Gizmo drag → rotate rectangle
    let gDrag = false, gLX = 0, gLY = 0;
    gc.addEventListener('pointerdown', (e) => {
      gDrag = true; gLX = e.clientX; gLY = e.clientY;
      gc.setPointerCapture(e.pointerId);
    });
    window.addEventListener('pointermove', (e) => {
      if (!gDrag) return;
      const dx = e.clientX - gLX, dy = e.clientY - gLY;
      gLX = e.clientX; gLY = e.clientY;
      const s = 0.008;
      tmpQ.setFromAxisAngle(AY, dx * s); rotQuat.premultiply(tmpQ);
      tmpQ.setFromAxisAngle(AX, dy * s); rotQuat.premultiply(tmpQ);
      rectGroup.quaternion.copy(rotQuat);
    });
    window.addEventListener('pointerup', () => { gDrag = false; });

    // ── UI: sliders ────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    // Line counts
    const hSlider = $('hLines'), vSlider = $('vLines');
    hSlider.addEventListener('input', () => { $('hVal').textContent = hSlider.value; buildLines(+hSlider.value, +vSlider.value); });
    vSlider.addEventListener('input', () => { $('vVal').textContent = vSlider.value; buildLines(+hSlider.value, +vSlider.value); });

    // Position sliders
    for (const [axis, prop] of [['posX', 'x'], ['posY', 'y'], ['posZ', 'z']]) {
      const sl = $(axis);
      sl.addEventListener('input', () => {
        $(axis + 'Val').textContent = (+sl.value).toFixed(1);
        rectGroup.position[prop] = +sl.value;
      });
    }

    // Reset
    $('resetBtn').addEventListener('click', () => {
      hlPct = 50; vlPct = 50;
      rotQuat.identity(); rectGroup.quaternion.identity();
      rectGroup.position.set(0, 0, 0);
      camera.position.z = CAM_Z;
      for (const id of ['posX', 'posY', 'posZ']) {
        $(id).value = 0; $(id + 'Val').textContent = '0.0';
      }
      layoutRefLines(); updateCamera();
    });

    // ── Init + resize ──────────────────────────────────────────────
    layoutRefLines(); updateCamera();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      layoutRefLines(); updateCamera();
    });

    // ── Render loop ────────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      gGroup.quaternion.copy(rectGroup.quaternion);
      renderer.render(scene, camera);
      gR.render(gScene, gCam);
    })();
  </script>
</body>
</html>
